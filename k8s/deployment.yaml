apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-ai
  namespace: default
  labels:
    app: sentinel-ai
    tier: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-ai
  template:
    metadata:
      labels:
        app: sentinel-ai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001

      containers:
        - name: sentinel-ai
          image: sentinel-ai:latest
          imagePullPolicy: IfNotPresent
          
          # Environment variables
          env:
            - name: ENV
              value: "production"
            - name: PORT
              value: "8000"
              
          ports:
            - containerPort: 8000
              name: http-web
              
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
              
          # Liveness and Readiness Probes pointing to /healthz
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 2
            
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
                
          volumeMounts:
            - name: temp-storage
              mountPath: /tmp

      volumes:
        - name: temp-storage
          emptyDir: {}
